<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Davide Sibilio</title>
  <script>
    // GitHub Pages SPA redirect trick (github.com/rafgraph/spa-github-pages)
    var l = window.location
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?/' +
      l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    )
  </script>
</head>
<body></body>
</html>
